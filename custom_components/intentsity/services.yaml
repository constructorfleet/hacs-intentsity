# yaml-language-server: $schema=../../schemas/yaml/services_schema.yaml
# Describes the format for available services for intentsity

reload_data:
  name: Reload Data
  description: Force a refresh of the integration data from the API

create_intent:
  name: Create Intent
  description: Create a new intent in the Intentsity store.
  fields:
    payload:
      name: Intent Payload
      description: The intent definition (dict or JSON).
      required: true
      example: '{"id": "greet", "slots": ["name"]}'
      selector:
        object: {}

update_intent:
  name: Update Intent
  description: Update an existing intent in the Intentsity store.
  fields:
    intent_id:
      name: Intent ID
      description: The ID of the intent to update.
      required: true
      example: "greet"
      selector:
        text: {}
    payload:
      name: Intent Payload
      description: The updated intent definition (dict or JSON).
      required: true
      example: '{"id": "greet", "slots": ["name"]}'
      selector:
        object: {}

delete_intent:
  name: Delete Intent
  description: Delete an intent from the Intentsity store.
  fields:
    intent_id:
      name: Intent ID
      description: The ID of the intent to delete.
      required: true
      example: "greet"
      selector:
        text: {}

import_intents:
  name: Import Intents
  description: Import multiple intents from a JSON array.
  fields:
    payload:
      name: Intents Array
      description: Array of intent definitions (list of dicts or JSON).
      required: true
      example: '[{"id": "greet", "slots": ["name"]}]'
      selector:
        object: {}

export_intents:
  name: Export Intents
  description: Export all intents as a JSON array.
  fields: {}
